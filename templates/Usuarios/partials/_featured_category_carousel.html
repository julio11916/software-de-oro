<section class="container catalog-shell destacados-shell featured-category-shell">
    <h2 class="section-title">{{ titulo }}</h2>
    {% if productos %}
    <div id="{{ carousel_id }}" class="destacados-carousel featured-carousel">
        <div class="featured-rail" data-featured-rail>
            <button class="featured-nav featured-nav-prev" type="button" aria-label="Ver prendas anteriores" data-featured-prev>
                <span aria-hidden="true">&#10094;</span>
            </button>
            <div id="{{ carousel_id }}-track" class="featured-track" tabindex="0" data-featured-track>
                {% for destacado in productos %}
                <article class="producto-card-destacado featured-card">
                    <a class="featured-card-link" href="{% if is_public_featured %}{{ url_for('login') }}{% else %}{{ url_for('product_detail', id_producto=destacado.id_producto) }}{% endif %}">
                        <img src="{{ url_for('static', filename=destacado.imagen_url) }}" class="producto-image-destacado" alt="{{ destacado.nombre }}">
                    </a>
                    <div class="producto-info-destacado">
                        <h5 class="producto-title-destacado">{{ destacado.nombre }}</h5>
                        <p class="producto-price-destacado">{{ destacado.precio|cop }}</p>
                    </div>
                </article>
                {% endfor %}
            </div>
            <button class="featured-nav featured-nav-next" type="button" aria-label="Ver mas prendas" data-featured-next>
                <span aria-hidden="true">&#10095;</span>
            </button>
        </div>
    </div>
    {% else %}
    <div class="alert alert-info text-center mt-3 mb-0">
        {{ empty_message }}
    </div>
    {% endif %}
</section>

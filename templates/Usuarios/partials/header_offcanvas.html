<header class="store-header">
    <div class="container-fluid px-3 px-lg-4">
        <div class="store-header-inner">
            <button class="icon-btn-dark" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuCanvas"
                aria-controls="menuCanvas">
                <i class="fas fa-bars"></i>
            </button>

            <a class="brand-logo" href="{{ url_for('user_dashboard') }}">
                <img src="{{ url_for('static', filename='img/Pagina/logo_transparente.png') }}" alt="Logo Nachoher">
            </a>

            <div class="header-actions">
                <a href="{{ url_for('cart') }}" class="icon-btn-dark">

                        </a>

            </div>

    </div>

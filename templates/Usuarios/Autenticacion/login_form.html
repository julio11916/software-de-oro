<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Iniciar sesion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/usuario/registro.css') }}">
</head>

<body class="auth-page">
    <div class="auth-card">
        <h3 class="mb-4 text-center">Iniciar sesion</h3>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">Correo electronico</label>
                <input type="email" class="form-control auth-input" name="email" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Contrasena</label>
                <input type="password" class="form-control auth-input" name="password" id="password" required>
            </div>
            <div class="d-grid gap-2 d-md-flex">
                <button type="submit" class="btn btn-dark flex-fill">Ingresar</button>
                <a href="{{ url_for('home') }}" class="btn btn-dark flex-fill">Cancelar</a>
            </div>
        </form>
        <div class="mt-4 text-center">
            <h6 class="mb-3">No tienes cuenta?</h6>
            <a href="{{ url_for('registro') }}" class="btn btn-dark w-100">Crear cuenta</a>
        </div>
    </div>
</body>

</html>

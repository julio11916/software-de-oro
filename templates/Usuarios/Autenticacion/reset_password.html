<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/usuario/registro.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h3 class="mb-3 text-center">Define tu nueva contraseña</h3>
        <p class="text-muted mb-3">
            Ingresa una contraseña segura para finalizar la recuperación.
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} py-2" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
            <div class="mb-3">
                <label for="new_password" class="form-label">Nueva contraseña</label>
                <input
                    type="password"
                    class="form-control auth-input"
                    name="new_password"
                    id="new_password"
                    required
                    minlength="8"
                    pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}"
                    title="Minimo 8 caracteres, con mayuscula, minuscula, numero y caracter especial."
                >
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirmar contraseña</label>
                <input type="password" class="form-control auth-input" name="confirm_password" id="confirm_password" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="showPasswords">
                <label class="form-check-label" for="showPasswords">Mostrar contraseña</label>
            </div>
            <div class="d-grid gap-2 d-md-flex">
                <button type="submit" class="btn btn-dark flex-fill">Actualizar contraseña</button>
                <a href="{{ url_for('login') }}" class="btn btn-dark flex-fill">Cancelar</a>
            </div>
        </form>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', function () {
        const toggle = document.getElementById('showPasswords');
        const pass = document.getElementById('new_password');
        const conf = document.getElementById('confirm_password');
        if (!toggle || !pass || !conf) return;
        toggle.addEventListener('change', function () {
            const tipo = toggle.checked ? 'text' : 'password';
            pass.type = tipo;
            conf.type = tipo;
        });
    });
    </script>
</body>
</html>

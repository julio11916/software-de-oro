<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel de Usuario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/usuarios.css">
</head>

<body>

    <!-- ======= SIDEBAR ======= -->
    <div id="sidebar" class="sidebar">

        <div class="sidebar-header text-center">
            <h4>Usuarios</h4>
        </div>

        <ul class="list-unstyled components">
            <li><a href="#">Home</a></li>
            <li><a href="#">Catálogo</a></li>
            <li><a href="#">Pedidos</a></li>
            <li><a href="#">Perfil</a></li>
            <li><a href="#">Cerrar Sesión</a></li>
        </ul>

    </div>

    <!-- ======= CONTENIDO PRINCIPAL ======= -->
    <div id="content">

        <!-- ======= NAVBAR / BANNER SUPERIOR ======= -->
        <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
            <div class="container-fluid">

                <button id="toggleSidebar" class="btn btn-menu">
                    ☰
                </button>

                <span class="navbar-brand ms-3">Mi Tienda - Usuarios</span>

                <div class="ms-auto">
                    <button class="btn btn-outline-light">Carrito</button>
                </div>
            </div>
        </nav>

        <!-- ======= BANNER PRINCIPAL ======= -->
        <section class="banner d-flex align-items-center justify-content-center">
            <div class="text-center text-white">
                <h1 class="display-4 fw-bold">Bienvenido Usuario</h1>
                <p class="lead">Explora nuestros productos destacados</p>
            </div>
        </section>

        <!-- ======= PRODUCTOS ======= -->
        <div class="container mt-5">
            <h2 class="text-white mb-4">Destacados</h2>

            <div class="row g-4">

                <div class="col-md-4">
                    <div class="card producto-card">
                        <img src="https://via.placeholder.com/400x300" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Producto 1</h5>
                            <p class="card-text">$60.000</p>
                            <button class="btn btn-gradiente w-100">Agregar</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card producto-card">
                        <img src="https://via.placeholder.com/400x300" class="card-img-top">
                        <div class="card-body">
                            <h5 class="card-title">Producto 2</h5>
                            <p class="card-text">$45.000</p>
                            <button class="btn btn-gradiente w-100">Agregar</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS Personalizado -->
    <script src="js/usuarios.js"></script>

</body>

</html>

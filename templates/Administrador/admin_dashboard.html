<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card {
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
    </style>
</head>

<body>
    <h1>Panel de Administración</h1>
    <p>Seleccione una sección:</p>
    <div class="grid">
        <div class="card"><a href="{{ url_for('admin_orders') }}">📦 Gestionar Pedidos</a></div>
        <div class="card"><a href="{{ url_for('admin_charts') }}">📊 Informes / Gráficas</a></div>
        <div class="card"><a href="{{ url_for('admin_logs') }}">📋 Registros</a></div>
        <div class="card"><a href="{{ url_for('admin_papelera') }}">🗑️ Papelera</a></div>
        <div class="card"><a href="{{ url_for('admin_pos') }}">🛒 Sistema POS</a></div>
        <div class="card"><a href="{{ url_for('admin_ajustes') }}">⚙️ Configuración</a></div>
    </div>
    <p><a href="{{ url_for('logout') }}">Cerrar sesión</a></p>
</body>

</html>

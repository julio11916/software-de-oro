<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Panel de Administración</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/administrador/admin_dashboard_principal.css') }}">
</head>

<body>

    <div class="d-flex dashboard-layout">

        <!-- Sidebar -->
        <div class="sidebar">

            <div class="logo-section">
                <img src="{{ url_for('static', filename='img/logo_transparente.png') }}" alt="Logo del proyecto" class="sidebar-logo">
            </div>

            <div class="user-section text-center">
                <small>Administrador</small>
                <h6 class="fw-bold">{{ admin_nombre or 'Administrador' }}</h6>
            </div>

            <ul class="nav flex-column mt-4">
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('admin_usuarios') }}">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('admin_charts') }}">Graficas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('admin_productos') }}">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('admin_pos') }}">Sistema POS</a>
                </li>
            </ul>

            <div class="sidebar-bottom mt-auto">
                <a href="{{ url_for('home') }}" class="btn btn-success w-100 mb-2" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='{{ url_for('home') }}'; } return false;">Volver</a>
                <a href="{{ url_for('logout') }}" class="btn btn-danger w-100">Cerrar Sesión</a>
            </div>

        </div>

        <!-- Main Content -->
        <div class="main-content w-100">

            <!-- Top Banner -->
            <div class="topbar d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-0">Panel de Administración</h4>
                    <small>Sistema de gestión</small>
                </div>
                <div id="fechaHora"></div>
            </div>

            <!-- Centro vacío -->
            <div class="content-area">
                <!-- Aquí irá el contenido después -->
            </div>

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS Personalizado -->
    <script src="{{ url_for('static', filename='js/administrador/admin_dashboard_principal.js') }}"></script>

</body>

</html>

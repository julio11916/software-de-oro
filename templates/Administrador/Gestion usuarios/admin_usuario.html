<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/administrador/admin_usuario.css') }}">
</head>

<body>
    <h1>Usuarios</h1>
    <a href="{{ url_for('admin_dashboard') }}">Volver al Dashboard</a>
    {% if usuarios %}
    <table>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Rol</th>
            <th>Fecha</th>
        </tr>
        {% for u in usuarios %}
        <tr>
            <td>{{ u.id_usuario }}</td>
            <td>{{ u.nombre }}</td>
            <td>{{ u.email }}</td>
            <td>{{ u.rol }}</td>
            <td>{{ u.fecha_registro }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>No hay usuarios.</p>
    {% endif %}
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Graficas de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/administrador/admin_dashboard_principal.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/administrador/admin_charts_dashboard.css') }}">
</head>

<body>
    <div class="d-flex dashboard-layout">
        <div class="sidebar">
            <div class="logo-section">
                <img src="{{ url_for('static', filename='img/logo_transparente.png') }}" alt="Logo del proyecto" class="sidebar-logo">
            </div>

            <div class="user-section text-center">
                <small>Administrador</small>
                <h6 class="fw-bold">{{ admin_nombre or 'Administrador' }}</h6>
            </div>

            <ul class="nav flex-column mt-4">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('admin_usuarios') }}">Usuarios</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="{{ url_for('admin_charts') }}">Graficas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('admin_productos') }}">Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('admin_pos') }}">Sistema POS</a>
                </li>
            </ul>

            <div class="sidebar-bottom mt-auto">
                <a href="{{ url_for('home') }}" class="btn btn-success w-100 mb-2" onclick="if (window.history.length > 1) { window.history.back(); } else { window.location.href='{{ url_for('home') }}'; } return false;">Volver</a>
                <a href="{{ url_for('logout') }}" class="btn btn-danger w-100">Cerrar Sesion</a>
            </div>
        </div>

        <div class="main-content w-100">
            <div class="topbar d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-0">Graficas de Ventas</h4>
                    <small>Analitica por producto y por mes</small>
                </div>
                <div id="fechaHora"></div>
            </div>

            <div class="content-area charts-content">
                <div id="chartData" data-productos='{{ ventas_producto|tojson }}' data-meses='{{ ventas_mes|tojson }}' class="d-none"></div>

                <div class="charts-grid">
                    <section class="chart-card">
                        <div class="chart-head">
                            <h5 class="mb-0">Ventas por Producto</h5>
                        </div>
                        <div class="chart-body">
                            <canvas id="chartProductos"></canvas>
                        </div>
                    </section>

                    <section class="chart-card">
                        <div class="chart-head">
                            <h5 class="mb-0">Ventas por Mes</h5>
                        </div>
                        <div class="chart-body">
                            <canvas id="chartMeses"></canvas>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/administrador/admin_dashboard_principal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/administrador/admin_charts_dashboard.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const chartData = document.getElementById('chartData');
            const ventasProducto = JSON.parse(chartData.dataset.productos || '[]');
            const ventasMes = JSON.parse(chartData.dataset.meses || '[]');
            initCharts(ventasProducto, ventasMes);
        });
    </script>
</body>

</html>
